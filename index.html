<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Mei</title>

    <!-- Tailwind Configuration for The Five Volumes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volumeWhisper: '#E6E6FA',
                        volumeTalk: '#E5E7EB',
                        volumeShout: '#FF7F50',
                        volumeLaugh: '#FDE047',
                        volumeCry: '#4682B4',
                        clearingBg: '#121015' /* Deep earthy tone, no clinical white */
                    },
                    animation: {
                        'breath': 'pulse-glow 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React, DOM, Babel, and Framer Motion CDN Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #121015; overflow: hidden; color: #E6E6FA; font-family: system-ui, -apple-system, sans-serif; cursor: none;}
        
        /* The Wayfinding Cursor Glow */
        .cursor-diffuse {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            width: 600px; height: 600px;
            margin-top: -300px; margin-left: -300px;
            background: radial-gradient(circle, rgba(230,230,250,0.12) 0%, rgba(230,230,250,0) 65%);
            z-index: 50;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .text-soft { text-shadow: 0 0 12px rgba(230,230,250,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { motion, useSpring, useMotionValue } = window.Motion;

        // 1. THE BREATH-SYNC ENGINE: 6 BPM Global State
        const MeiContext = createContext();
        const MeiProvider = ({ children }) => {
            const [volume, setVolume] = useState('whisper'); // Whisper, Talk, Shout, Laugh, Cry
            
            return (
                <MeiContext.Provider value={{ volume, setVolume }}>
                    {children}
                </MeiContext.Provider>
            );
        };

        // 4. WAYFINDING NAVIGATION: Eliminate standard buttons, use cursor lighting.
        const DiffusedCursor = () => {
            const cursorX = useMotionValue(-500);
            const cursorY = useMotionValue(-500);
            const springConfig = { damping: 30, stiffness: 100, mass: 1 };
            const mouseX = useSpring(cursorX, springConfig);
            const mouseY = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => {
                    cursorX.set(e.clientX);
                    cursorY.set(e.clientY);
                };
                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, [cursorX, cursorY]);

            return <motion.div className="cursor-diffuse" style={{ x: mouseX, y: mouseY }} />;
        };

        // 3. THE "PEBBLE" PROXY: Floating Draggable SVG
        const PebbleProxy = ({ onClick }) => {
            const path1 = "M30,25 C60,10 85,25 85,55 C85,85 60,90 30,80 C10,70 5,45 30,25 Z";
            const path2 = "M40,20 C70,15 90,35 80,65 C70,90 40,95 20,75 C5,55 10,25 40,20 Z";
            const path3 = "M50,15 C80,20 95,50 75,80 C55,100 20,85 15,60 C10,35 25,10 50,15 Z";

            return (
                <motion.div 
                    drag 
                    dragConstraints={{ left: -300, right: 300, top: -300, bottom: 300 }}
                    dragElastic={0.2}
                    whileHover={{ scale: 1.05 }}
                    whileTap={{ scale: 0.95 }}
                    onClick={onClick}
                    className="relative cursor-pointer z-20 flex flex-col items-center group"
                    initial={{ opacity: 0, y: 30 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 4, ease: "easeOut" }}
                >
                    {/* Breath-sync shadow matching 6 BPM (10s total cycle) */}
                    <motion.div 
                        animate={{ opacity: [0.1, 0.4, 0.1], scale: [1, 1.15, 1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 rounded-full blur-3xl bg-volumeWhisper/40"
                    />
                    
                    <svg viewBox="0 0 100 100" className="w-64 h-64 drop-shadow-2xl">
                        <defs>
                            <linearGradient id="pebbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="#2A2A35" />
                                <stop offset="100%" stopColor="#15141A" />
                            </linearGradient>
                        </defs>
                        <motion.path
                            animate={{ d: [path1, path2, path3, path1] }}
                            transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                            fill="url(#pebbleGrad)"
                            stroke="#E6E6FA"
                            strokeWidth="0.5"
                            strokeOpacity="0.4"
                        />
                        <text x="50" y="52" fontSize="9" fill="#E6E6FA" textAnchor="middle" opacity="0.6" className="font-light tracking-[0.3em] pointer-events-none text-soft">
                            i don't know
                        </text>
                    </svg>
                </motion.div>
            );
        };

        // 2. THE LANDING CLEARING SCAFFOLD
        const LandingClearing = () => {
            const { volume, setVolume } = useContext(MeiContext);
            const [interactionPhase, setInteractionPhase] = useState('scaffold');

            const triggerWhisperIntro = () => {
                setInteractionPhase('whisper-intro');
                setVolume('whisper');
            };

            return (
                <div className="w-full h-screen flex flex-col items-center justify-center relative bg-clearingBg text-volumeWhisper overflow-hidden select-none">
                    <DiffusedCursor />

                    {interactionPhase === 'scaffold' && (
                        <div className="flex flex-col items-center space-y-16 mt-20">
                            <motion.h1 
                                initial={{ opacity: 0, filter: "blur(15px)" }}
                                animate={{ opacity: 0.8, filter: "blur(0px)" }}
                                transition={{ duration: 5, delay: 1 }}
                                className="text-xl md:text-3xl tracking-[0.4em] font-extralight text-soft"
                            >
                                THE CLEARING
                            </motion.h1>
                            
                            <PebbleProxy onClick={triggerWhisperIntro} />
                            
                            <motion.p
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 0.4 }}
                                transition={{ duration: 3, delay: 4 }}
                                className="text-sm font-light tracking-widest"
                            >
                                [ DRAG OR TAP TO BEGIN ]
                            </motion.p>
                        </div>
                    )}

                    {interactionPhase === 'whisper-intro' && (
                        <motion.div 
                            initial={{ opacity: 0, y: 10, scale: 0.98 }}
                            animate={{ opacity: 1, y: 0, scale: 1 }}
                            transition={{ duration: 3, ease: 'easeOut' }}
                            className="z-10 max-w-2xl text-center px-8"
                        >
                            <motion.p 
                                animate={{ opacity: [0.5, 1, 0.5] }}
                                transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                                className="text-3xl md:text-5xl font-light leading-relaxed text-soft tracking-wide"
                            >
                                "It's safe here. There are no edges. I am Mei, and whenever you are ready, I am already listening."
                            </motion.p>
                        </motion.div>
                    )}

                    {/* Background Heartbeat Rhythm (6 BPM Inhale/Exhale Pulse) */}
                    <motion.div 
                        animate={{ opacity: [0.03, 0.08, 0.03] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-900/20 via-clearingBg to-clearingBg"
                    />
                </div>
            );
        };

        const App = () => (
            <MeiProvider>
                <LandingClearing />
            </MeiProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
