<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUT Forge | Drop the Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #f2efe9;
            --accent-glow: rgba(242, 239, 233, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 0%, var(--accent-glow), transparent 25%),
                radial-gradient(circle at 85% 100%, var(--accent-glow), transparent 25%);
            transition: background-image 0.8s ease;
        }

        #app-container {
            width: 100%;
            max-width: 680px;
            padding: 20px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: 600;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-block {
            width: 100%;
            margin-bottom: 12px;
            text-align: left;
            justify-content: flex-start;
            padding: 18px 24px;
            font-size: 1.1rem;
        }

        .btn-block.active {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 4px 0 0 var(--accent);
        }

        .input-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .input-area:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-frame {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Kopitiam Modal */
        .kopitiam-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .kopitiam-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .kopitiam-dialog {
            background: #271c19; /* coffee tint */
            border: 1px solid #d97706; /* amber */
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kopitiam-overlay.active .kopitiam-dialog {
            transform: scale(1);
        }

        .kopi-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Breadcrumbs */
        .breadcrumb-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideInRight 0.5s forwards;
            position: relative;
        }
        
        .breadcrumb-item::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 35px;
            bottom: -20px;
            width: 2px;
            background: var(--glass-border);
        }
        .breadcrumb-item:last-child::before {
            display: none;
        }

        .breadcrumb-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 2px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            flex-shrink: 0;
            z-index: 2;
        }

        .breadcrumb-content {
            background: var(--glass-bg);
            padding: 16px;
            border-radius: 12px;
            flex-grow: 1;
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 12px;
            border: 1px solid currentColor;
        }

        .flex-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .flex-row .btn {
            flex: 1;
        }
        
        /* Particle effect for Alice */
        .alice-glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--accent);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: pulse 4s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.1; }
            100% { transform: scale(1.5) translate(20px, 20px); opacity: 0.25; }
        }

    </style>
</head>
<body>

    <div class="alice-glow" style="top: 10%; right: 10%;"></div>
    <div class="alice-glow" style="bottom: 10%; left: 10%;"></div>

    <!-- Kopitiam Jargon Buster Modal -->
    <div class="kopitiam-overlay" id="kopitiam-modal">
        <div class="kopitiam-dialog">
            <div class="kopi-icon">☕</div>
            <h2 style="color: #fcd34d;">Aiya, speak plain English leh!</h2>
            <p id="kopitiam-text" style="color: #f8fafc; font-size: 1.1rem;"></p>
            <button class="btn btn-primary" onclick="closeKopitiam()">I'll try again</button>
        </div>
    </div>

    <div id="app-container">
        <!-- Render Area -->
        <div id="view-root" class="glass-card"></div>
    </div>

    <script>
        // --- Configuration & Constants ---
        const THEMES = {
            "Impact": { color: "#10b981", rgb: "16, 185, 129" },
            "Reserves": { color: "#f59e0b", rgb: "245, 158, 11" },
            "Fundraising": { color: "#8b5cf6", rgb: "139, 92, 246" },
            "Purpose": { color: "#0ea5e9", rgb: "14, 165, 233" },
            "Talent": { color: "#f43f5e", rgb: "244, 63, 94" }
        };

        const JARGON_LIST = ["capacity building", "synergy", "leverage", "ecosystem", "paradigm", "holistic", "scalable", "empower", "disrupt", "agile", "bandwidth"];

        // --- State Management ---
        let state = {
            view: 'home', // home, filter, spark, storming, wayfinding, result
            category: null,
            sparkText: "",
            caughtJargon: "",
            stormQuestions: [],
            selectedQuestion: "",
            boardSpeakMode: false
        };

        // --- View Controller ---
        const root = document.getElementById('view-root');

        function render() {
            root.className = 'glass-card view-frame'; // Trigger animation
            // Reset animation
            void root.offsetWidth; 
            
            switch(state.view) {
                case 'home': renderHome(); break;
                case 'filter': renderFilter(); break;
                case 'spark': renderSpark(); break;
                case 'storming': renderStorming(); break;
                case 'wayfinding': renderWayfinding(); break;
                case 'result': renderResult(); break;
            }
        }

        // --- Views ---

        function renderHome() {
            root.innerHTML = `
                <div class="badge" style="color: #94a3b8; border-color: #334155;">CharityOps OS</div>
                <h1>Welcome to RUT Forge.</h1>
                <p style="font-size: 1.2rem;">Drop the gravity of 20-page proposals. Generate a <em>Really Useful Thing</em> (RUT)—a quick, disposable, hyper-focused tool for your charity's immediate friction point.</p>
                <div style="margin-top: 40px;">
                    <button class="btn btn-primary" onclick="navigate('filter')" style="font-size: 1.1rem; padding: 16px 32px;">
                        Start Building →
                    </button>
                </div>
            `;
        }

        function renderFilter() {
            setTheme("#f2efe9", "242, 239, 233"); // Reset theme
            let buttonsHtml = '';
            for (const [cat, data] of Object.entries(THEMES)) {
                buttonsHtml += `
                    <button class="btn btn-block" onclick="selectCategory('${cat}', '${data.color}', '${data.rgb}')">
                        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:${data.color}; margin-right:12px;"></span>
                        ${cat}
                    </button>
                `;
            }

            root.innerHTML = `
                <h2>The Single-Issue Filter</h2>
                <p>No feature creep allowed. You must pick <strong>exactly one</strong> area to fix today.</p>
                <div style="margin-top: 24px;">
                    ${buttonsHtml}
                </div>
            `;
        }

        function selectCategory(cat, hex, rgb) {
            state.category = cat;
            setTheme(hex, rgb);
            setTimeout(() => navigate('spark'), 300);
        }

        function renderSpark() {
            root.innerHTML = `
                <div class="badge" style="color: var(--accent);">${state.category}</div>
                <h2>Phase 1: The Spark</h2>
                <p>What is the <strong>one thing</strong> making your team exhausted today regarding ${state.category}?</p>
                <textarea id="spark-input" class="input-area" placeholder="E.g., Our board doesn't understand why we hold so much cash, so they keep rejecting new hires..."></textarea>
                <button class="btn btn-primary" onclick="processSpark()">Ignite Engine</button>
            `;
        }

        function renderStorming() {
            const qs = generateQuestions(state.category, state.sparkText);
            state.stormQuestions = qs;
            
            let questionsHtml = qs.map((q, idx) => `
                <button class="btn btn-block" style="line-height: 1.4; padding: 20px;" onclick="selectQuestion(${idx})">
                    ${q}
                </button>
            `).join('');

            root.innerHTML = `
                <div class="badge" style="color: var(--accent);">Question-Storming</div>
                <h2>Reframing the Friction</h2>
                <p>Instead of a standard form, pick the question that makes you most uncomfortable (or curious). <em>The path is the point.</em></p>
                <div id="storm-options" style="margin-top: 24px;">
                    ${questionsHtml}
                </div>
            `;
        }

        function selectQuestion(idx) {
            state.selectedQuestion = state.stormQuestions[idx];
            
            // Re-render to show selection
            const opts = document.getElementById('storm-options');
            const btns = opts.querySelectorAll('.btn-block');
            btns.forEach((b, i) => {
                if(i === idx) b.classList.add('active');
                else b.classList.remove('active');
            });

            // Show proceed button if not there
            if (!document.getElementById('proceed-way-btn')) {
                const btn = document.createElement('button');
                btn.id = 'proceed-way-btn';
                btn.className = 'btn btn-primary';
                btn.style.marginTop = '24px';
                btn.innerText = 'Follow this thread →';
                btn.onclick = () => navigate('wayfinding');
                btn.style.animation = 'fadeIn 0.5s forwards';
                root.appendChild(btn);
            }
        }

        function renderWayfinding() {
            root.innerHTML = `
                <div class="badge" style="color: var(--accent);">Alice Engine Processing</div>
                <h2>Cognitive Breadcrumbs</h2>
                <p>Mapping your mindset shift...</p>
                <div id="breadcrumbs-container" style="margin-top: 30px;"></div>
            `;

            const container = document.getElementById('breadcrumbs-container');
            const breadcrumbs = getBreadcrumbs();
            
            breadcrumbs.forEach((bc, idx) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'breadcrumb-item';
                    el.innerHTML = `
                        <div class="breadcrumb-dot">
                           <span style="font-size:0.8rem">${idx+1}</span>
                        </div>
                        <div class="breadcrumb-content">
                            <strong style="color: var(--text-main); display:block; margin-bottom:4px;">${bc.title}</strong>
                            <span style="color: var(--text-muted); font-size: 0.95rem;">${bc.text}</span>
                        </div>
                    `;
                    container.appendChild(el);

                    // If last item, show next phase button
                    if(idx === breadcrumbs.length - 1) {
                        setTimeout(() => {
                            const btn = document.createElement('button');
                            btn.className = 'btn btn-primary';
                            btn.style.marginTop = '24px';
                            btn.innerText = 'Generate 48-Hour Micro-Pilot';
                            btn.onclick = () => navigate('result');
                            btn.style.animation = 'fadeIn 0.5s forwards';
                            root.appendChild(btn);
                        }, 800);
                    }
                }, idx * 1200); // Staggered appearance
            });
        }

        function renderResult() {
            const pilot = getPilotContent();
            
            let displayHtml = state.boardSpeakMode ? `
                <div style="background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h3 style="color:white; margin-bottom: 12px; font-size: 1.1rem;">Formal Board Summary</h3>
                    <div style="margin-bottom: 8px;"><strong>Risk Profile:</strong> Extremely Low (Contained 48-hour window)</div>
                    <div style="margin-bottom: 8px;"><strong>ROI Vector:</strong> Strategic clarity on ${state.category} governance.</div>
                    <div style="margin-bottom: 8px;"><strong>Reserves Impact:</strong> $0 outlay, leverages existing internal capacity.</div>
                    <div style="margin-bottom: 8px;"><strong>GEC 2023 Alignment:</strong> Strong demonstration of proactive gap-analysis.</div>
                </div>
            ` : `
                <div style="background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h3 style="color:white; margin-bottom: 12px; font-size: 1.1rem;">Your Action Plan</h3>
                    <p style="color: var(--text-main); font-size: 1.05rem;">${pilot}</p>
                </div>
            `;

            root.innerHTML = `
                <div class="badge" style="color: var(--accent);">Final RUT</div>
                <h2>The 48-Hour Micro-Pilot</h2>
                <p>The smallest possible action your team can take in 2 days to test this insight.</p>
                
                ${displayHtml}

                <div class="flex-row" style="flex-wrap: wrap;">
                    <button class="btn" onclick="toggleBoardSpeak()">
                        ${state.boardSpeakMode ? "Revert to Founder-speak" : "💼 Translate to Board-Speak"}
                    </button>
                    <button class="btn btn-primary" onclick="exportWhatsApp()">
                        💬 Share to WhatsApp
                    </button>
                </div>
                <div style="text-align: center; margin-top: 24px;">
                    <button class="btn" style="background: transparent; border: none; text-decoration: underline; opacity: 0.6;" onclick="navigate('home')">Start Over</button>
                </div>
            `;
        }

        // --- Logic & Helpers ---

        function navigate(viewName) {
            state.view = viewName;
            render();
        }

        function setTheme(hex, rgb) {
            document.documentElement.style.setProperty('--accent', hex);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${rgb}, 0.15)`);
        }

        function processSpark() {
            const inputTxt = document.getElementById('spark-input').value;
            if(!inputTxt.trim()) return;

            // Kopitiam Auntie Jargon Check
            const lowerInput = inputTxt.toLowerCase();
            const caught = JARGON_LIST.find(j => lowerInput.includes(j));

            if (caught) {
                state.caughtJargon = caught;
                document.getElementById('kopitiam-text').innerHTML = `You used the word <strong>"${caught}"</strong>.<br>Explain it to me like we are eating chicken rice. No Consultant Speak!`;
                document.getElementById('kopitiam-modal').classList.add('active');
                return;
            }

            state.sparkText = inputTxt;
            navigate('storming');
        }

        function closeKopitiam() {
            document.getElementById('kopitiam-modal').classList.remove('active');
            document.getElementById('spark-input').value = ""; // Force them to rewrite
            document.getElementById('spark-input').focus();
        }

        function toggleBoardSpeak() {
            state.boardSpeakMode = !state.boardSpeakMode;
            renderResult();
        }

        function exportWhatsApp() {
            const text = `Hi! I just mapped out a strategy on RUT Forge.

*Focus Area:* ${state.category}
*New Perspective:* ${state.selectedQuestion}

*Our 48-hour pilot:*
${getPilotContent()}

Want to trace the logic? Let's discuss this at the next meeting! 🚀`;

            const encoded = encodeURIComponent(text);
            window.open(`https://wa.me/?text=${encoded}`, '_blank');
        }

        // --- Mock Content Generators (Singapore Context Injected) ---

        function generateQuestions(category, text) {
            // Mocking the Alice AI framework connecting intent to unexpected paths
            const map = {
                "Impact": [
                    "What if measuring our impact is actually hurting our beneficiaries?",
                    "How might we prove our value to NCSS without a single chart?",
                    "Who are we trying to impress with this metric, the community or the donors?"
                ],
                "Reserves": [
                    "What if our massive warchest is sending a signal that we don't need help?",
                    "How can we spend 2% of reserves tomorrow to radically improve staff morale?",
                    "Are we saving for a rainy day, or are we already in a flood?"
                ],
                "Fundraising": [
                    "How would we survive if the Tote Board stopped matching funds today?",
                    "What if we stopped begging for money and started selling our expertise?",
                    "Who is our most ignored donor demographic in the local heartlands?"
                ],
                "Purpose": [
                    "If our charity closed down tomorrow, who would actually miss us?",
                    "Are we solving the structural problem, or just acting as an IPC-certified band-aid?",
                    "How might we make our mission redundant in 5 years?"
                ],
                "Talent": [
                    "Why do passionate social workers leave us for corporate ESG roles?",
                    "What if we fired our strictest volunteer requirements?",
                    "How can we make our organization the best place to fail safely in Singapore?"
                ]
            };
            return map[category] || map["Purpose"];
        }

        function getBreadcrumbs() {
            return [
                { title: "The Old Mindset", text: `Obsessing over: "${state.sparkText.substring(0, 40)}..."` },
                { title: "The Singapore Context", text: getContextInsight() },
                { title: "The Pivot (The Wayfinding)", text: `Realizing we must answer: ${state.selectedQuestion}` }
            ];
        }

        function getContextInsight() {
            const insights = {
                "Impact": "In the local IPC ecosystem, quantitative outputs often overshadow qualitative human dignity.",
                "Reserves": "Singapore's culture of prudence makes charities hoard cash, alienating modern donors who want immediate action.",
                "Fundraising": "Heavy reliance on government matching grants creates a false sense of sustainability.",
                "Purpose": "We are operating in an incredibly dense, overlapping charity landscape—differentiation is survival.",
                "Talent": "The local talent crunch means we can't compete on salary; we must compete on agency and culture."
            };
            return insights[state.category] || insights["Purpose"];
        }

        function getPilotContent() {
            const pilots = {
                "Impact": "Draft a 1-page impact narrative focusing solely on ONE beneficiary's story, completely devoid of numbers. Send it to 3 core supporters via WhatsApp.",
                "Reserves": "Identify a $500 'friction' (e.g., slow software, bad chairs). Use reserves to buy the solution immediately without waiting for the next exco meeting to prove agility.",
                "Fundraising": "Stop one scheduled fundraising email. Instead, personally call 3 lapsed donors to just ask 'How are you?' with zero financial asks.",
                "Purpose": "Next team meeting, start by asking: 'What is one program we run that we secretly know doesn't work?' Put it on the chopping block.",
                "Talent": "Give a junior staff member $200 and total autonomy to run a 2-hour internal 'Fail on Purpose' workshop this Friday."
            };
            return pilots[state.category] || pilots["Purpose"];
        }

        // Initialize
        render();

    </script>
</body>
</html>
