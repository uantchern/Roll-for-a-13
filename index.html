<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Mei</title>

    <!-- Tailwind Configuration for The Five Volumes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volumeWhisper: '#E6E6FA',
                        volumeTalk: '#E5E7EB',
                        volumeShout: '#FF7F50',
                        volumeLaugh: '#FDE047',
                        volumeCry: '#4682B4',
                        clearingBg: '#FDFBF7', /* Warm, safe, creamy off-white */
                        textSoftDark: '#5C5470'
                    },
                    animation: {
                        'breath': 'pulse-glow 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React, DOM, Babel, and Framer Motion CDN Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #FDFBF7; overflow: hidden; color: #5C5470; font-family: system-ui, -apple-system, sans-serif;}
        
        .text-soft { text-shadow: 0 0 15px rgba(92,84,112,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { motion, useSpring, useMotionValue } = window.Motion;

        // 1. THE BREATH-SYNC ENGINE: 6 BPM Global State
        const MeiContext = createContext();
        const MeiProvider = ({ children }) => {
            const [volume, setVolume] = useState('whisper'); // Whisper, Talk, Shout, Laugh, Cry
            
            return (
                <MeiContext.Provider value={{ volume, setVolume }}>
                    {children}
                </MeiContext.Provider>
            );
        };

        // 4. WAYFINDING NAVIGATION: A gentle, warm ambient sunlight that follows the cursor instead of a harsh glow
        const DiffusedCursor = () => {
            const cursorX = useMotionValue(window.innerWidth / 2);
            const cursorY = useMotionValue(window.innerHeight / 2);
            const springConfig = { damping: 40, stiffness: 80, mass: 1 };
            const mouseX = useSpring(cursorX, springConfig);
            const mouseY = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => {
                    cursorX.set(e.clientX);
                    cursorY.set(e.clientY);
                };
                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, [cursorX, cursorY]);

            return (
                <motion.div 
                    className="pointer-events-none fixed top-0 left-0 w-[600px] h-[600px] -mt-[300px] -ml-[300px] z-0 rounded-full blur-3xl opacity-60"
                    style={{ 
                        x: mouseX, 
                        y: mouseY,
                        background: 'radial-gradient(circle, rgba(255,228,196,0.5) 0%, rgba(253,251,247,0) 70%)' // Warm peach/sunlight gradient
                    }} 
                />
            );
        };

        // 3. THE "PEBBLE" PROXY: A soft, pastel worry-stone
        const PebbleProxy = ({ onClick }) => {
            const path1 = "M30,25 C60,10 85,25 85,55 C85,85 60,90 30,80 C10,70 5,45 30,25 Z";
            const path2 = "M40,20 C70,15 90,35 80,65 C70,90 40,95 20,75 C5,55 10,25 40,20 Z";
            const path3 = "M50,15 C80,20 95,50 75,80 C55,100 20,85 15,60 C10,35 25,10 50,15 Z";

            return (
                <motion.div 
                    drag 
                    dragConstraints={{ left: -300, right: 300, top: -300, bottom: 300 }}
                    dragElastic={0.2}
                    whileHover={{ scale: 1.05 }}
                    whileTap={{ scale: 0.95 }}
                    onClick={onClick}
                    className="relative cursor-pointer z-20 flex flex-col items-center group"
                    initial={{ opacity: 0, scale: 0.8 }}
                    animate={{ opacity: 1, scale: 1 }}
                    transition={{ duration: 3, ease: "easeOut" }}
                >
                    {/* Breath-sync shadow matching 6 BPM (10s total cycle) */}
                    <motion.div 
                        animate={{ opacity: [0.4, 0.7, 0.4], scale: [1, 1.1, 1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 rounded-full blur-2xl bg-volumeWhisper/60"
                    />
                    
                    <svg viewBox="0 0 100 100" className="w-56 h-56 drop-shadow-xl">
                        <defs>
                            <linearGradient id="pebbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="#E6E6FA" /> {/* Lavender */}
                                <stop offset="100%" stopColor="#B4D4FF" /> {/* Soft Sky Blue */}
                            </linearGradient>
                            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <motion.path
                            animate={{ d: [path1, path2, path3, path1] }}
                            transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                            fill="url(#pebbleGrad)"
                            stroke="#FFFFFF"
                            strokeWidth="1.5"
                            strokeOpacity="0.8"
                            filter="url(#softGlow)"
                        />
                        <text x="50" y="52" fontSize="9" fill="#5C5470" textAnchor="middle" opacity="0.7" className="font-semibold tracking-[0.2em] pointer-events-none">
                            i don't know
                        </text>
                    </svg>
                </motion.div>
            );
        };

        // 2. THE LANDING CLEARING SCAFFOLD
        const LandingClearing = () => {
            const { volume, setVolume } = useContext(MeiContext);
            const [interactionPhase, setInteractionPhase] = useState('scaffold');

            const triggerWhisperIntro = () => {
                setInteractionPhase('whisper-intro');
                setVolume('whisper');
            };

            return (
                <div className="w-full h-screen flex flex-col items-center justify-center relative bg-gradient-to-br from-[#FFF5E4] via-[#FDFBF7] to-[#F3E8FF] text-textSoftDark overflow-hidden select-none">
                    <DiffusedCursor />

                    {interactionPhase === 'scaffold' && (
                        <div className="flex flex-col items-center space-y-16 mt-16">
                            <motion.h1 
                                initial={{ opacity: 0, filter: "blur(10px)", y: -20 }}
                                animate={{ opacity: 0.6, filter: "blur(0px)", y: 0 }}
                                transition={{ duration: 4, delay: 0.5 }}
                                className="text-xl md:text-3xl tracking-[0.4em] font-light text-soft text-[#8B7E9A]"
                            >
                                THE CLEARING
                            </motion.h1>
                            
                            <PebbleProxy onClick={triggerWhisperIntro} />
                            
                            <motion.p
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 0.5 }}
                                transition={{ duration: 3, delay: 3 }}
                                className="text-xs md:text-sm font-medium tracking-widest text-[#8B7E9A]"
                            >
                                [ DRAG OR TAP TO BEGIN ]
                            </motion.p>
                        </div>
                    )}

                    {interactionPhase === 'whisper-intro' && (
                        <motion.div 
                            initial={{ opacity: 0, y: 15, scale: 0.95 }}
                            animate={{ opacity: 1, y: 0, scale: 1 }}
                            transition={{ duration: 3, ease: 'easeOut' }}
                            className="z-10 max-w-2xl text-center px-8"
                        >
                            <motion.p 
                                animate={{ opacity: [0.7, 1, 0.7] }}
                                transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                                className="text-2xl md:text-4xl font-light leading-relaxed text-textSoftDark tracking-wide"
                            >
                                "It's safe here. There are no edges. I am Mei, and whenever you are ready, I am already listening."
                            </motion.p>
                        </motion.div>
                    )}

                    {/* Background Heartbeat Rhythm (6 BPM Inhale/Exhale Pulse) */}
                    <motion.div 
                        animate={{ opacity: [0.1, 0.3, 0.1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#FFF8F0]/40 via-transparent to-transparent"
                    />
                </div>
            );
        };

        const App = () => (
            <MeiProvider>
                <LandingClearing />
            </MeiProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
